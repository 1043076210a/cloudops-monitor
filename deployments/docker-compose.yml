services:
  mysql:
    image: mysql:8.0
    container_name: cloudops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cloudops-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cloud_ops_monitor}
      MYSQL_USER: ${MYSQL_USER:-cloudops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cloudops}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: cloudops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:v24.1.9
    container_name: cloudops-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: cloudops-vm
    restart: unless-stopped
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/victoria-metrics-data

  loki:
    image: grafana/loki:2.9.8
    container_name: cloudops-loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    container_name: cloudops-promtail
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: cloudops-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: cloudops-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/otel-collector-config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/otel-collector-config.yml:ro
    depends_on:
      - jaeger

  grafana:
    image: grafana/grafana:11.1.0
    container_name: cloudops-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - victoriametrics
      - loki
      - jaeger

volumes:
  mysql_data:
  vm_data:
  loki_data:
  grafana_data:
