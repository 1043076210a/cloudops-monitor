apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-server
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-server
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudops-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudops-server
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: server
          image: cloudops/server:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cloudops-config
          env:
            - name: MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: cloudops-secret
                  key: MYSQL_DSN
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudops-secret
                  key: REDIS_PASSWORD
            - name: WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: cloudops-secret
                  key: WEBHOOK_URL
            - name: OTEL_SERVICE_NAME
              value: cloudops-server
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /ping
              port: http
            failureThreshold: 90
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-server
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-server
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    app.kubernetes.io/name: cloudops-server
  ports:
    - name: http
      port: 8080
      targetPort: http
