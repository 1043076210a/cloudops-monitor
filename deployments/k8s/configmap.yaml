apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudops-config
  namespace: cloudops
  labels:
    app.kubernetes.io/part-of: cloudops-monitor
data:
  HTTP_PORT: "8080"
  MYSQL_CONNECT_RETRIES: "60"
  MYSQL_CONNECT_RETRY_INTERVAL_SECONDS: "2"
  INGEST_MODE: "kafka"
  KAFKA_BROKERS: "cloudops-redpanda:9092"
  KAFKA_TOPIC: "cloudops.metrics"
  KAFKA_GROUP_ID: "cloudops-worker"
  WORKER_PROCESS_TARGET_URL: "http://cloudops-server:8080/api/v1/metrics/process"
  VICTORIA_METRICS_URL: "http://cloudops-victoriametrics:8428/api/v1/import/prometheus"
  ALERT_STORE: "redis"
  REDIS_ADDR: "cloudops-redis:6379"
  REDIS_DB: "0"
  NOTIFIER_TYPE: "noop"
  WEBHOOK_PROVIDER: "feishu"
  CPU_ALERT_THRESHOLD: "80"
  ALERT_TRIGGER_COUNT: "3"
  ALERT_COOLDOWN_SECONDS: "60"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "cloudops-otel-collector:4317"
  WORKER_METRICS_PORT: "9091"
  SERVER_BASE_URL: "http://cloudops-server:8080"
  ASSISTANT_LISTEN_ADDR: ":8090"
  ASSISTANT_SERVER_BASE_URL: "http://cloudops-server:8080"
  ASSISTANT_VICTORIA_BASE_URL: "http://cloudops-victoriametrics:8428"
  ASSISTANT_LOKI_BASE_URL: "http://cloudops-loki:3100"
  ASSISTANT_DEFAULT_WINDOW_MINUTES: "15"
