apiVersion: v1
kind: Secret
metadata:
  name: cloudops-secret
  namespace: cloudops
  labels:
    app.kubernetes.io/part-of: cloudops-monitor
type: Opaque
stringData:
  # Demo values for local kind/dev only. Replace these before using a shared cluster.
  MYSQL_ROOT_PASSWORD: cloudops-root
  MYSQL_DATABASE: cloud_ops_monitor
  MYSQL_USER: cloudops
  MYSQL_PASSWORD: cloudops
  MYSQL_DSN: cloudops:cloudops@tcp(cloudops-mysql:3306)/cloud_ops_monitor?charset=utf8mb4&parseTime=True&loc=Local
  REDIS_PASSWORD: ""
  WEBHOOK_URL: ""
