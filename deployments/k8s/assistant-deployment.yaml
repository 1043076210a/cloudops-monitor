apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-assistant
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-assistant
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudops-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudops-assistant
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: assistant
          image: cloudops/assistant:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: cloudops-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-assistant
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-assistant
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    app.kubernetes.io/name: cloudops-assistant
  ports:
    - name: http
      port: 8090
      targetPort: http
