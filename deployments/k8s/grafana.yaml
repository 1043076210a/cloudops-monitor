apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudops-grafana-datasources
  namespace: cloudops
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: cloudops-monitor
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://cloudops-victoriametrics:8428
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        access: proxy
        url: http://cloudops-loki:3100
        editable: true
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://cloudops-jaeger:16686
        editable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-grafana
  namespace: cloudops
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: datasources
          configMap:
            name: cloudops-grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-grafana
  namespace: cloudops
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
