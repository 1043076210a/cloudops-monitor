apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-jaeger
  namespace: cloudops
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.57
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-jaeger
  namespace: cloudops
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: ui
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
