apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudops-agent
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-agent
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudops-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudops-agent
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: agent
          image: cloudops/agent:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVER_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: cloudops-config
                  key: SERVER_BASE_URL
