apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloudops-victoriametrics-data
  namespace: cloudops
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-victoriametrics
  namespace: cloudops
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: victoriametrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoriametrics
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:latest
          ports:
            - name: http
              containerPort: 8428
          volumeMounts:
            - name: data
              mountPath: /victoria-metrics-data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cloudops-victoriametrics-data
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-victoriametrics
  namespace: cloudops
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    app.kubernetes.io/name: victoriametrics
  ports:
    - name: http
      port: 8428
      targetPort: http
