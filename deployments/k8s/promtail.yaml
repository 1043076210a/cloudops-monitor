apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudops-promtail
  namespace: cloudops
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: cloudops-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudops-promtail
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: cloudops-monitor
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudops-promtail
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: cloudops-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudops-promtail
subjects:
  - kind: ServiceAccount
    name: cloudops-promtail
    namespace: cloudops
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudops-promtail-config
  namespace: cloudops
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: cloudops-monitor
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://cloudops-loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
        pipeline_stages:
          - cri: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudops-promtail
  namespace: cloudops
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      serviceAccountName: cloudops-promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          args:
            - -config.file=/etc/promtail/promtail.yml
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: positions
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudops-promtail-config
        - name: positions
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
