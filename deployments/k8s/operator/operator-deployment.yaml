apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudops-operator
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-operator
    app.kubernetes.io/part-of: cloudops-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudops-operator
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-operator
    app.kubernetes.io/part-of: cloudops-monitor
rules:
  - apiGroups: [""]
    resources:
      - configmaps
    verbs:
      - get
      - update
      - patch
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
    verbs:
      - get
      - update
      - patch
  - apiGroups: ["cloudops.example.com"]
    resources:
      - cloudopsmonitors
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["cloudops.example.com"]
    resources:
      - cloudopsmonitors/status
    verbs:
      - get
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudops-operator
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-operator
    app.kubernetes.io/part-of: cloudops-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudops-operator
subjects:
  - kind: ServiceAccount
    name: cloudops-operator
    namespace: cloudops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-operator
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-operator
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudops-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudops-operator
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      serviceAccountName: cloudops-operator
      containers:
        - name: operator
          image: cloudops/operator:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLOUDOPS_MONITOR_NAME
              value: cloudops
            - name: RECONCILE_INTERVAL_SECONDS
              value: "15"
