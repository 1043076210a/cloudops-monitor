apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cloudopsmonitors.cloudops.example.com
  labels:
    app.kubernetes.io/name: cloudopsmonitor-crd
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  group: cloudops.example.com
  scope: Namespaced
  names:
    plural: cloudopsmonitors
    singular: cloudopsmonitor
    kind: CloudOpsMonitor
    shortNames:
      - com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - ingestMode
                - server
                - worker
                - agent
                - dependencies
              properties:
                ingestMode:
                  type: string
                  enum:
                    - direct
                    - kafka
                server:
                  type: object
                  required:
                    - image
                    - replicas
                  properties:
                    image:
                      type: string
                    replicas:
                      type: integer
                      minimum: 1
                worker:
                  type: object
                  required:
                    - image
                    - replicas
                  properties:
                    image:
                      type: string
                    replicas:
                      type: integer
                      minimum: 0
                agent:
                  type: object
                  required:
                    - image
                  properties:
                    image:
                      type: string
                dependencies:
                  type: object
                  required:
                    - mysqlDSNSecretRef
                    - redisAddr
                    - kafkaBrokers
                    - victoriaMetricsURL
                  properties:
                    mysqlDSNSecretRef:
                      type: string
                    redisAddr:
                      type: string
                    kafkaBrokers:
                      type: string
                    victoriaMetricsURL:
                      type: string
                    otelEndpoint:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.ingestMode
        - name: Server
          type: integer
          jsonPath: .spec.server.replicas
        - name: Worker
          type: integer
          jsonPath: .spec.worker.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
