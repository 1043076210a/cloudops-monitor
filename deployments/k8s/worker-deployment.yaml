apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-worker
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-worker
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudops-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudops-worker
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: worker
          image: cloudops/worker:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9091
          envFrom:
            - configMapRef:
                name: cloudops-config
          env:
            - name: OTEL_SERVICE_NAME
              value: cloudops-worker
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-worker
  namespace: cloudops
  labels:
    app.kubernetes.io/name: cloudops-worker
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    app.kubernetes.io/name: cloudops-worker
  ports:
    - name: metrics
      port: 9091
      targetPort: metrics
