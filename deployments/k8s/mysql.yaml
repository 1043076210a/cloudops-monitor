apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloudops-mysql-data
  namespace: cloudops
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-mysql
  namespace: cloudops
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudops-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: cloudops-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: cloudops-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudops-secret
                  key: MYSQL_PASSWORD
          readinessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: 90
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: mysql
            failureThreshold: 60
            periodSeconds: 5
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: cloudops-mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-mysql
  namespace: cloudops
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    app.kubernetes.io/name: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
