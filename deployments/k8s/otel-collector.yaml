apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudops-otel-collector-config
  namespace: cloudops
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: cloudops-monitor
data:
  otel-collector-config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
    exporters:
      otlp/jaeger:
        endpoint: cloudops-jaeger:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-otel-collector
  namespace: cloudops
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: cloudops-monitor
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.101.0
          args:
            - --config=/etc/otelcol-contrib/otel-collector-config.yml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
      volumes:
        - name: config
          configMap:
            name: cloudops-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-otel-collector
  namespace: cloudops
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: cloudops-monitor
spec:
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
